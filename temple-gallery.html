<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temple Gallery - All 230 Temples</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .subtitle {
            font-size: 1.25rem;
            opacity: 0.95;
        }

        .stats {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin: 2rem 0;
            flex-wrap: wrap;
        }

        .stat {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            border-radius: 12px;
            color: white;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            display: block;
        }

        .stat-label {
            font-size: 0.875rem;
            opacity: 0.9;
        }

        .filters {
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .search-box {
            flex: 1;
            min-width: 300px;
        }

        .search-box input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
        }

        .search-box input:focus {
            outline: none;
            border-color: #667eea;
        }

        .filter-buttons {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 0.5rem 1rem;
            border: 2px solid #e2e8f0;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .filter-btn:hover {
            background: #f7fafc;
        }

        .filter-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
        }

        .temple-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .temple-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .temple-image {
            width: 100%;
            height: 250px;
            object-fit: cover;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 3rem;
        }

        .temple-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .temple-content {
            padding: 1.5rem;
        }

        .temple-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: #2d3748;
            margin-bottom: 0.5rem;
        }

        .temple-location {
            color: #667eea;
            font-weight: 600;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .temple-status {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .status-dedicated {
            background: #c6f6d5;
            color: #22543d;
        }

        .status-construction {
            background: #feebc8;
            color: #7c2d12;
        }

        .status-announced {
            background: #bee3f8;
            color: #2c5282;
        }

        .temple-timeline {
            border-top: 1px solid #e2e8f0;
            padding-top: 1rem;
            margin-top: 1rem;
        }

        .timeline-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
        }

        .timeline-milestone {
            font-weight: 600;
            color: #4a5568;
        }

        .timeline-date {
            color: #718096;
        }

        .temple-facts {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #e2e8f0;
        }

        .facts-title {
            font-weight: 700;
            color: #4a5568;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
        }

        .temple-facts ul {
            list-style: none;
            font-size: 0.875rem;
            color: #4a5568;
        }

        .temple-facts li {
            margin-bottom: 0.5rem;
            padding-left: 1.25rem;
            position: relative;
        }

        .temple-facts li:before {
            content: "•";
            position: absolute;
            left: 0;
            color: #667eea;
            font-weight: 700;
        }

        .temple-coordinates {
            margin-top: 0.5rem;
            font-size: 0.75rem;
            color: #718096;
            font-family: 'Courier New', monospace;
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 1.5rem;
            padding: 3rem;
        }

        .no-results {
            text-align: center;
            color: white;
            font-size: 1.5rem;
            padding: 3rem;
            grid-column: 1 / -1;
        }

        @media (max-width: 768px) {
            .gallery {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏛️ Temple Gallery</h1>
            <p class="subtitle">Comprehensive data for all temples of The Church of Jesus Christ of Latter-day Saints</p>
            <div class="stats">
                <div class="stat">
                    <span class="stat-number" id="total-count">0</span>
                    <span class="stat-label">Total Temples</span>
                </div>
                <div class="stat">
                    <span class="stat-number" id="dedicated-count">0</span>
                    <span class="stat-label">Dedicated</span>
                </div>
                <div class="stat">
                    <span class="stat-number" id="construction-count">0</span>
                    <span class="stat-label">Under Construction</span>
                </div>
                <div class="stat">
                    <span class="stat-number" id="announced-count">0</span>
                    <span class="stat-label">Announced</span>
                </div>
            </div>
        </header>

        <div class="filters">
            <div class="search-box">
                <input type="text" id="search" placeholder="🔍 Search temples by name or location...">
            </div>
            <div class="filter-buttons">
                <button class="filter-btn active" data-status="all">All</button>
                <button class="filter-btn" data-status="Dedicated">Dedicated</button>
                <button class="filter-btn" data-status="Under Construction">Under Construction</button>
                <button class="filter-btn" data-status="Announced">Announced</button>
            </div>
        </div>

        <div class="gallery" id="gallery">
            <div class="loading">Loading temples...</div>
        </div>
    </div>

    <script>
        let allTemples = [];
        let currentFilter = 'all';
        let searchQuery = '';

        // Load temple data
        fetch('temples-data.json')
            .then(res => res.json())
            .then(temples => {
                allTemples = temples;
                updateStats();
                renderTemples();
            })
            .catch(err => {
                document.getElementById('gallery').innerHTML =
                    '<div class="no-results">❌ Error loading temple data: ' + err.message + '</div>';
            });

        function updateStats() {
            document.getElementById('total-count').textContent = allTemples.length;
            document.getElementById('dedicated-count').textContent =
                allTemples.filter(t => t.status === 'Dedicated').length;
            document.getElementById('construction-count').textContent =
                allTemples.filter(t => t.status === 'Under Construction').length;
            document.getElementById('announced-count').textContent =
                allTemples.filter(t => t.status === 'Announced').length;
        }

        function renderTemples() {
            let filtered = allTemples;

            // Apply status filter
            if (currentFilter !== 'all') {
                filtered = filtered.filter(t => t.status === currentFilter);
            }

            // Apply search filter
            if (searchQuery) {
                const query = searchQuery.toLowerCase();
                filtered = filtered.filter(t =>
                    t.name.toLowerCase().includes(query) ||
                    t.location.toLowerCase().includes(query) ||
                    (t.country && t.country.toLowerCase().includes(query))
                );
            }

            const gallery = document.getElementById('gallery');

            if (filtered.length === 0) {
                gallery.innerHTML = '<div class="no-results">No temples found matching your criteria</div>';
                return;
            }

            gallery.innerHTML = filtered.map(temple => `
                <div class="temple-card">
                    <div class="temple-image">
                        ${temple.imageUrl ?
                            `<img src="${temple.imageUrl}" alt="${temple.name}" onerror="this.parentElement.innerHTML='🏛️'">` :
                            '🏛️'
                        }
                    </div>
                    <div class="temple-content">
                        <h2 class="temple-name">${temple.name}</h2>
                        <div class="temple-location">📍 ${temple.location}</div>
                        <span class="temple-status status-${temple.status.toLowerCase().replace(' ', '-')}">${temple.status}</span>

                        ${temple.timeline && temple.timeline.length > 0 ? `
                            <div class="temple-timeline">
                                ${temple.timeline.slice(0, 3).map(item => `
                                    <div class="timeline-item">
                                        <span class="timeline-milestone">${item.milestone}</span>
                                        <span class="timeline-date">${item.date}</span>
                                    </div>
                                `).join('')}
                            </div>
                        ` : ''}

                        ${temple.coordinates && temple.coordinates.latitude && temple.coordinates.longitude ? `
                            <div class="temple-coordinates">
                                📍 ${temple.coordinates.latitude.toFixed(4)}, ${temple.coordinates.longitude.toFixed(4)}
                            </div>
                        ` : ''}

                        ${temple.facts && temple.facts.length > 0 ? `
                            <div class="temple-facts">
                                <div class="facts-title">Interesting Facts:</div>
                                <ul>
                                    ${temple.facts.slice(0, 3).map(fact => `<li>${fact}</li>`).join('')}
                                </ul>
                            </div>
                        ` : ''}
                    </div>
                </div>
            `).join('');
        }

        // Search functionality
        document.getElementById('search').addEventListener('input', (e) => {
            searchQuery = e.target.value;
            renderTemples();
        });

        // Filter buttons
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.status;
                renderTemples();
            });
        });
    </script>
</body>
</html>
